<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Coaching Notes Generator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #f4f6fb;
  padding: 30px;
  margin: 0;
}

.container {
  max-width: 1150px;
  margin: auto;
  background: white;
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 0 12px rgba(0,0,0,.1);
}

h1 { text-align:center; color:#124734; }

.layout {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 28px;
}

.form-section, .output-section {
  background: #f9fbff;
  border: 1px solid #dbe7ff;
  border-radius: 14px;
  padding: 20px;
}

label { font-weight:700; margin-top:12px; display:block; }

input, textarea {
  width:100%;
  padding:10px;
  border:1px solid #cbd5e1;
  border-radius:8px;
}

textarea { min-height:90px; }

.bluebox {
  background:#dbe8f7;
  padding:20px;
  border-radius:10px;
  white-space:pre-wrap;
  min-height:650px;
}

.button-row {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  margin-top:18px;
}

button {
  border:none;
  padding:12px;
  border-radius:8px;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.copy-btn { background:#0f766e; }
.clear-btn { background:#dc2626; }
.print-btn { background:#64748b; }

.holland-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.holland-option input { display:none; }

.holland-pill {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:10px;
  border-radius:999px;
  border:2px solid #94a3b8;
  background:white;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.holland-pill:hover {
  background:#e0f2fe;
}

.holland-option input:checked + .holland-pill {
  background:#2563eb;
  color:white;
  border-color:#1d4ed8;
}

/* RANK */
.rank {
  display:none;
  background:rgba(255,255,255,.25);
  padding:2px 6px;
  border-radius:999px;
  font-size:12px;
}

/* SHOW RANK */
.holland-option input:checked + .holland-pill .rank {
  display:inline-block;
  animation: pop .25s ease;
}

/* ANIMATION */
@keyframes pop {
  0% { transform:scale(.5); opacity:0; }
  70% { transform:scale(1.2); opacity:1; }
  100% { transform:scale(1); }
}

</style>
</head>

<body>

<div class="container">
<h1>Summer Coaching Notes Generator</h1>

<div class="layout">

<div class="form-section">

<label>Top Career #1</label>
<input id="career1" oninput="generate()">

<label>Top Career #2</label>
<input id="career2" oninput="generate()">

<label>Top Career #3</label>
<input id="career3" oninput="generate()">

<label>First Choice Summer Program</label>
<textarea id="summer" oninput="generate()"></textarea>

<label>Phase</label>
<input id="phase" oninput="generate()">

<label>Top 3 Holland Codes</label>

<div class="holland-grid">

<label class="holland-option">
<input type="checkbox" value="Realistic">
<span class="holland-pill"><span class="rank"></span>Realistic</span>
</label>

<label class="holland-option">
<input type="checkbox" value="Investigative">
<span class="holland-pill"><span class="rank"></span>Investigative</span>
</label>

<label class="holland-option">
<input type="checkbox" value="Artistic">
<span class="holland-pill"><span class="rank"></span>Artistic</span>
</label>

<label class="holland-option">
<input type="checkbox" value="Social">
<span class="holland-pill"><span class="rank"></span>Social</span>
</label>

<label class="holland-option">
<input type="checkbox" value="Enterprising">
<span class="holland-pill"><span class="rank"></span>Enterprising</span>
</label>

<label class="holland-option">
<input type="checkbox" value="Conventional">
<span class="holland-pill"><span class="rank"></span>Conventional</span>
</label>

</div>

<label>Interests</label>
<textarea id="interests" oninput="generate()"></textarea>

<label>Resources</label>
<textarea id="resources" oninput="generate()"></textarea>

<label>Next Step</label>
<textarea id="next" oninput="generate()"></textarea>

<label>Summary</label>
<textarea id="summary" oninput="generate()"></textarea>

<div class="button-row">
<button class="copy-btn" onclick="copyText()">Copy</button>
<button class="clear-btn" onclick="clearForm()">Clear</button>
<button class="print-btn" onclick="window.print()">Print</button>
</div>

</div>

<div class="output-section">
<div id="output" class="bluebox"></div>
</div>

</div>
</div>

<script>

let hollandSelectionOrder = [];

document.querySelectorAll('.holland-option input').forEach(box=>{
  box.addEventListener("change",()=>{

    const val = box.value;

    if(box.checked){
      if(hollandSelectionOrder.length >=3){
        box.checked = false;
        return;
      }
      hollandSelectionOrder.push(val);
    } else {
      hollandSelectionOrder = hollandSelectionOrder.filter(v=>v!==val);
    }

    updateRanks();
    generate();
  });
});

function updateRanks(){
  document.querySelectorAll('.holland-option').forEach(opt=>{
    const val = opt.querySelector("input").value;
    const rank = opt.querySelector(".rank");
    const index = hollandSelectionOrder.indexOf(val);

    if(index >= 0){
      rank.textContent = `#${index+1}`;
    } else {
      rank.textContent = "";
    }
  });
}

function build(title,val){
  return val.trim() ? `\n\n${title}:\n${val}` : "";
}

function generate(){

  const holland = hollandSelectionOrder.length
    ? hollandSelectionOrder.map((c,i)=>`${i+1}. ${c}`).join("\n")
    : "";

  let result = `Top 3 Careers:
1. ${career1.value}
2. ${career2.value}
3. ${career3.value}`;

  result += build("First Choice Summer Program", summer.value);
  result += build("Phase", phase.value);
  result += build("Top 3 Holland Codes", holland);
  result += build("Interests", interests.value);
  result += build("Resources", resources.value);
  result += build("Next Step", next.value);
  result += build("Summary", summary.value);

  output.innerText = result;
}

function copyText(){
  navigator.clipboard.writeText(output.innerText);
  alert("Copied!");
}

function clearForm(){
  document.querySelectorAll("input, textarea").forEach(e=>e.value="");
  document.querySelectorAll(".holland-option input").forEach(e=>e.checked=false);
  hollandSelectionOrder = [];
  updateRanks();
  generate();
}

generate();

</script>

</body>
</html>
