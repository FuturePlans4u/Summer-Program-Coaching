<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Coaching Notes Generator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  padding: 30px;
  margin: 0;
  color: #1f2937;
}

/* ✅ LOGO STYLE (correct place now) */
.site-logo {
  display: block;
  margin: 20px auto;
  max-width: 420px;
}

.container {
  max-width: 1150px;
  margin: auto;
  background: white;
  padding: 28px;
  border-radius: 14px;
  box-shadow: 0 0 12px rgba(0,0,0,.10);
}

h1 {
  text-align: center;
  color: #124734;
  margin-top: 0;
}

.layout {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 28px;
}

.form-section,
.output-section {
  background: #f9fbff;
  border: 1px solid #dbe7ff;
  border-radius: 14px;
  padding: 20px;
}

label {
  font-weight: 700;
  margin-top: 12px;
  display: block;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
}

textarea {
  min-height: 90px;
}

.bluebox {
  background: #dbe8f7;
  padding: 20px;
  border-radius: 10px;
  white-space: pre-wrap;
  min-height: 650px;
}

.button-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 15px;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.copy-btn { background: #0f766e; }
.clear-btn { background: #dc2626; }
.print-btn { background: #64748b; }

/* Phase */
.phase-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.phase-btn {
  padding: 12px;
  border: 2px solid #94a3b8;
  background: white;
  cursor: pointer;
  font-weight: bold;
}

.phase-btn.selected {
  background: #2563eb;
  color: white;
}

.phase-description {
  margin-top: 10px;
  font-size: 14px;
  background: #f8fafc;
  padding: 10px;
  border-radius: 8px;
}

/* Holland */
.holland-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.holland-option input { display:none; }

.holland-pill {
  border: 2px solid #94a3b8;
  border-radius: 999px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

.holland-option input:checked + .holland-pill {
  background: #2563eb;
  color: white;
}

.rank {
  display:none;
}

.holland-pill.has-rank .rank {
  display:inline-block;
}
</style>
</head>

<body>

<!-- ✅ LOGO IN CORRECT PLACE -->
<img src="logo.png" class="site-logo">

<div class="container">
<h1>Summer Coaching Notes Generator</h1>

<div class="layout">

<div class="form-section">

<label>Top Career #1</label>
<input id="career1" oninput="generate()">

<label>Top Career #2</label>
<input id="career2" oninput="generate()">

<label>Top Career #3</label>
<input id="career3" oninput="generate()">

<label>First Choice Summer Program</label>
<textarea id="summer" oninput="generate()"></textarea>

<label>Phase</label>
<div class="phase-grid">
<button class="phase-btn" onclick="setPhase('Discovery', this)">Discovery</button>
<button class="phase-btn" onclick="setPhase('Engagement', this)">Engagement</button>
</div>

<div class="phase-description">
<strong>Discovery:</strong> Still exploring career interests.<br><br>
<strong>Engagement:</strong> Actively learning and engaging in career opportunities.
</div>

<input id="phase" type="hidden">

<label>Top 3 Holland Codes</label>
<div class="holland-grid">

<label class="holland-option">
<input type="checkbox" value="Realistic">
<div class="holland-pill"><span class="rank"></span>Realistic</div>
</label>

<label class="holland-option">
<input type="checkbox" value="Investigative">
<div class="holland-pill"><span class="rank"></span>Investigative</div>
</label>

<label class="holland-option">
<input type="checkbox" value="Artistic">
<div class="holland-pill"><span class="rank"></span>Artistic</div>
</label>

<label class="holland-option">
<input type="checkbox" value="Social">
<div class="holland-pill"><span class="rank"></span>Social</div>
</label>

<label class="holland-option">
<input type="checkbox" value="Enterprising">
<div class="holland-pill"><span class="rank"></span>Enterprising</div>
</label>

<label class="holland-option">
<input type="checkbox" value="Conventional">
<div class="holland-pill"><span class="rank"></span>Conventional</div>
</label>

</div>

<label>Interests</label>
<textarea id="interests" oninput="generate()"></textarea>

<label>Resources</label>
<textarea id="resources" oninput="generate()"></textarea>

<label>Next Step</label>
<textarea id="next" oninput="generate()"></textarea>

<label>Summary</label>
<textarea id="summary" oninput="generate()"></textarea>

<div class="button-row">
<button class="copy-btn" onclick="copyText()">Copy</button>
<button class="clear-btn" onclick="clearForm()">Clear</button>
<button class="print-btn" onclick="window.print()">Print</button>
</div>

</div>

<div class="output-section">
<div id="output" class="bluebox"></div>
</div>

</div>
</div>

<script>
let phase = "";
let hollandOrder = [];

function setPhase(val, btn){
  phase = val;
  document.getElementById("phase").value = val;

  document.querySelectorAll(".phase-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");

  generate();
}

document.querySelectorAll('.holland-option input').forEach(box=>{
  box.addEventListener("change",()=>{
    const val = box.value;

    if(box.checked){
      if(hollandOrder.length >=3){
        box.checked = false;
        return;
      }
      hollandOrder.push(val);
    } else {
      hollandOrder = hollandOrder.filter(v=>v!==val);
    }

    updateRanks();
    generate();
  });
});

function updateRanks(){
  document.querySelectorAll('.holland-option').forEach(opt=>{
    const val = opt.querySelector("input").value;
    const rank = opt.querySelector(".rank");
    const pill = opt.querySelector(".holland-pill");
    const i = hollandOrder.indexOf(val);

    if(i>=0){
      rank.textContent = "#"+(i+1);
      pill.classList.add("has-rank");
    } else {
      rank.textContent="";
      pill.classList.remove("has-rank");
    }
  });
}

function build(title,val){
  return val ? `\n\n${title}:\n${val}` : "";
}

function generate(){
  let result = `Top 3 Careers:
1. ${career1.value}
2. ${career2.value}
3. ${career3.value}`;

  result += build("First Choice Summer Program", summer.value);
  result += build("Phase", phase);
  result += build("Top 3 Holland Codes",
    hollandOrder.map((c,i)=>`${i+1}. ${c}`).join("\n")
  );
  result += build("Interests", interests.value);
  result += build("Resources", resources.value);
  result += build("Next Step", next.value);
  result += build("Summary", summary.value);

  output.innerText = result;
}

function copyText(){
  navigator.clipboard.writeText(output.innerText);
  alert("Copied!");
}

function clearForm(){
  document.querySelectorAll("input, textarea").forEach(el=>el.value="");
  hollandOrder=[];
  phase="";

  document.querySelectorAll(".phase-btn").forEach(b=>b.classList.remove("selected"));
  document.querySelectorAll('.holland-option input').forEach(b=>b.checked=false);

  updateRanks();
  generate();
}

generate();
</script>

</body>
</html>
